name: Generate Signals & Forecasts

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate Signals
      run: python analysis/signals.py || echo "Signal generation failed, continuing..."
    
    - name: Generate Forecasts
      run: python analysis/forecasts.py || echo "Forecast generation failed, continuing..."
    
    - name: Check generated analysis
      run: |
        echo "Analysis files created:"
        ls -la data/signals/ || echo "No signals yet"
        ls -la data/forecasts/ || echo "No forecasts yet"
    
    - name: Commit and push analysis
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ || true
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Auto: Weekly analysis $(date +%Y-%m-%d)"
          git push
        else
          echo "No changes to commit"
        fi
