name: Seed Gold, USD Index, Rice (Run Once)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seed-remaining:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Seed Gold, USD Index, Rice
      env:
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      run: python seed_gold_usd_rice.py

    - name: Regenerate signals
      run: python analysis/signals.py

    - name: Regenerate forecasts
      run: python analysis/forecasts.py

    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/
        if ! git diff --staged --quiet; then
          git commit -m "Seed: Add Gold, USD Index, Rice data"
          git push
        else
          echo "Nothing new to commit"
        fi
