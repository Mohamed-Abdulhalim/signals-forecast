name: Reset and Regenerate Backtests (Run Once)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-backtests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Strip old backtest entries
      run: python reset_backtests.py

    - name: Regenerate backtests with direction_correct field
      run: python analysis/generate_backtest.py

    - name: Commit updated track record
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/track_record.json
        if ! git diff --staged --quiet; then
          git commit -m "Migrate: regenerate backtests with directional accuracy field"
          git push
        else
          echo "Nothing changed."
        fi
