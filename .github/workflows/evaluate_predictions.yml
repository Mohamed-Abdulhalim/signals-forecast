name: Evaluate Predictions

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run outcome evaluator
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python analysis/evaluate_predictions.py
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/track_record.json
          git diff --staged --quiet || git commit -m "Auto: evaluate prediction outcomes $(date +%Y-%m-%d)"
          git push
