name: Refresh Current Prices (4-hour)

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance

    - name: Refresh current prices
      env:
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      run: python collectors/refresh_prices.py

    - name: Commit updated prices
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/prices/
        if ! git diff --staged --quiet; then
          git commit -m "Refresh: Price update $(date -u +%Y-%m-%dT%H:%M)UTC"
          git push
        else
          echo "Prices unchanged — nothing to commit"
        fi
